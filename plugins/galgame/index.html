<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; color: #fff; width: 100vw; height: 100vh; }

#bg { position: fixed; inset: 0; border-radius: 28px; overflow: hidden; background: radial-gradient(circle at 50% 18%, rgba(130,150,255,.28), transparent 34%), linear-gradient(160deg, #17142a 0%, #20204a 52%, #0f2740 100%); box-shadow: 0 18px 60px rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.14); }

#character {
  position: fixed; bottom: 210px; left: 50%; transform: translateX(-50%);
  height: 440px; display: flex; align-items: flex-end; justify-content: center;
}
#character canvas { height: 100%; }

#dialog-box {
  position: fixed; left: 16px; right: 16px; bottom: 18px; min-height: 176px;
  background: rgba(12,14,34,0.86); border: 1px solid rgba(180,190,255,0.28);
  border-radius: 22px; padding: 16px 18px 14px;
  backdrop-filter: blur(12px); box-shadow: 0 10px 36px rgba(0,0,0,.32);
}
#speaker { font-size: 14px; color: #a0b0ff; margin-bottom: 6px; font-weight: bold; }
#dialog-text { font-size: 15px; line-height: 1.7; color: #eee; min-height: 48px; }
#input-row { display: flex; gap: 8px; margin-top: 10px; }
#input-row input {
  flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(120,140,255,0.3);
  border-radius: 20px; padding: 7px 16px; color: #fff; font-size: 13px; outline: none;
}
#input-row input::placeholder { color: rgba(255,255,255,0.3); }
#input-row button {
  background: rgba(120,140,255,0.7); border: none; border-radius: 20px;
  padding: 7px 18px; color: #fff; cursor: pointer; font-size: 13px;
}
#input-row button:hover { background: rgba(120,140,255,0.9); }

#topbar {
  position: fixed; top: 10px; left: 10px; right: 10px; height: 36px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 12px; gap: 8px;
  background: rgba(0,0,0,0.18); border-radius: 18px; -webkit-app-region: drag;
}
#topbar button {
  -webkit-app-region: no-drag;
  background: rgba(255,255,255,0.1); border: none; border-radius: 6px;
  color: #fff; padding: 3px 10px; cursor: pointer; font-size: 12px;
}
#topbar button:hover { background: rgba(255,255,255,0.2); }

#history {
  position: fixed; top: 54px; right: 14px; left: 14px; bottom: 220px;
  overflow-y: auto; padding: 10px; display: none;
  background: rgba(0,0,0,0.42); backdrop-filter: blur(8px); border-radius: 16px;
}
#history .msg { margin-bottom: 8px; font-size: 12px; line-height: 1.5; }
#history .msg.user { color: #a0c4ff; text-align: right; }
#history .msg.ai { color: #eee; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="topbar">
  <button onclick="toggleHistory()">📜</button>
  <button onclick="capture()">📷</button>
  <button onclick="switchToPet()">🐾 小精灵</button>
  <button onclick="window.require('electron').ipcRenderer.send('switch-mode','close')">✕</button>
</div>

<div id="character"><canvas id="c" width="400" height="480"></canvas></div>

<div id="history" id="hist-panel"></div>

<div id="dialog-box">
  <div id="speaker">otto</div>
  <div id="dialog-text">双击小精灵进入聊天啦～想说什么？(✧◡✧)</div>
  <div id="input-row">
    <input id="msg" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron')
const path = require('path')
const THREE = require('three')
const { MMDLoader } = require('three/examples/jsm/loaders/MMDLoader.js')
const { MMDAnimationHelper } = require('three/examples/jsm/animation/MMDAnimationHelper.js')
const fs = require('fs')

const cfg = JSON.parse(fs.readFileSync(path.join(__dirname,'../../core/config.json'), 'utf8'))

// ── 3D渲染 ──
const canvas = document.getElementById('c')
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
renderer.setSize(400, 480)
renderer.setClearColor(0x000000, 0)
const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(20, 400/480, 0.1, 100)
camera.position.set(0, 13, 35)
camera.lookAt(0, 11, 0)
scene.add(new THREE.AmbientLight(0xffffff, 1.3))
const dir = new THREE.DirectionalLight(0xffffff, 0.8); dir.position.set(3,10,5); scene.add(dir)

const helper = new MMDAnimationHelper()
const loader = new MMDLoader()
const modelPath = path.join(__dirname, '../../models/', cfg.activeModel)
loader.load(modelPath, mesh => {
  scene.add(mesh)
  const vmd = path.join(__dirname, '../../motions/idle.vmd')
  if (fs.existsSync(vmd)) loader.loadAnimation(vmd, mesh, a => helper.add(mesh, { animation: a, physics: true }))
})
const clock = new THREE.Clock()
;(function animate() { requestAnimationFrame(animate); helper.update(clock.getDelta()); renderer.render(scene, camera) })()

// ── 对话 ──
const AGENT = cfg.agent
let history = []

function typeText(el, text, speed = 30) {
  el.textContent = ''
  let i = 0
  const t = setInterval(() => { el.textContent += text[i++]; if (i >= text.length) clearInterval(t) }, speed)
}

async function sendMsg() {
  const input = document.getElementById('msg')
  const text = input.value.trim(); if (!text) return
  input.value = ''
  addHistory('user', text)
  document.getElementById('dialog-text').textContent = '...'
  history.push({ role: 'user', content: text })
  try {
    const res = await fetch(`${AGENT.base_url}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AGENT.api_key}` },
      body: JSON.stringify({ model: AGENT.model, messages: history })
    })
    const data = await res.json()
    const reply = data.choices[0].message.content
    history.push({ role: 'assistant', content: reply })
    typeText(document.getElementById('dialog-text'), reply)
    addHistory('ai', reply)
    ipcRenderer.send('plugin-msg', { type: 'chat-reply', text: reply })
  } catch(e) { document.getElementById('dialog-text').textContent = '连接失败 (⊙_⊙)' }
}

function addHistory(role, text) {
  const panel = document.getElementById('history')
  const d = document.createElement('div'); d.className = `msg ${role}`
  d.textContent = (role === 'user' ? '你: ' : 'otto: ') + text
  panel.appendChild(d); panel.scrollTop = panel.scrollHeight
}

function toggleHistory() {
  const p = document.getElementById('history')
  p.style.display = p.style.display === 'block' ? 'none' : 'block'
}

async function capture() {
  const dataUrl = await ipcRenderer.invoke('capture', 'fullscreen', {})
  if (dataUrl) { await ipcRenderer.invoke('save-image', dataUrl); document.getElementById('dialog-text').textContent = '截图已保存 ✓' }
}

function switchToPet() { ipcRenderer.send('switch-mode', 'pet') }

ipcRenderer.on('plugin-msg', (e, msg) => {
  if (msg.type === 'chat-reply') {
    typeText(document.getElementById('dialog-text'), msg.text)
    addHistory('ai', msg.text)
  }
})
</script>
</body>
</html>
