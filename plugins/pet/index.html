<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DeepDesk Pet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:transparent; user-select:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
#c { position:fixed; inset:0; width:100vw; height:100vh; display:block; pointer-events:none; filter:saturate(1.18) contrast(1.06); }
#hud, #bubble, #hitbox { pointer-events:auto; }
#hitbox { position:fixed; left:50%; bottom:0; width:180px; height:320px; transform:translateX(-50%); cursor:grab; border-radius:48% 48% 16px 16px; }
#hitbox.dragging { cursor:grabbing; }
#bubble {
  position:fixed; display:none; max-width:280px; padding:10px 13px; border-radius:16px;
  background:rgba(255,255,255,.94); color:#2d3240; font-size:13px; line-height:1.45;
  box-shadow:0 8px 26px rgba(30,40,80,.18); backdrop-filter:blur(8px); word-break:break-word;
}
#bubble:after { content:""; position:absolute; bottom:-8px; left:38px; border:8px solid transparent; border-top-color:rgba(255,255,255,.94); border-bottom:0; }
#hud {
  position:fixed; right:10px; bottom:10px; display:flex; align-items:center; gap:6px;
  padding:6px; border-radius:14px; background:rgba(255,255,255,.72); box-shadow:0 8px 24px rgba(30,40,80,.14); backdrop-filter:blur(10px);
}
#hud button, #hud select {
  height:28px; border:0; border-radius:10px; background:rgba(255,255,255,.92); color:#30384f;
  padding:0 9px; font-size:12px; cursor:pointer; box-shadow:inset 0 0 0 1px rgba(90,100,150,.12);
}
#hud button:hover, #hud select:hover { background:#eef1ff; }
#status {
  position:fixed; left:10px; bottom:10px; max-width:45vw; padding:6px 10px; border-radius:10px;
  color:#4b5672; background:rgba(255,255,255,.62); font-size:11px; backdrop-filter:blur(8px); pointer-events:none;
}
#chat { position:fixed; right:10px; bottom:54px; display:none; gap:6px; width:310px; padding:8px; border-radius:14px; background:rgba(255,255,255,.78); box-shadow:0 8px 24px rgba(30,40,80,.14); backdrop-filter:blur(10px); pointer-events:auto; }
#chat input { flex:1; min-width:0; height:30px; border:0; border-radius:10px; padding:0 10px; outline:none; background:rgba(255,255,255,.95); }
#chat button { width:54px; border:0; border-radius:10px; background:#7f8cf4; color:white; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hitbox" title="拖动我；双击切换 Galgame"></div>
<div id="bubble"></div>
<div id="status">DeepDesk: booting…</div>
<div id="chat"><input id="msg" placeholder="和桌宠说话…" onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()">发送</button></div>
<div id="hud">
  <select id="motion" title="动作">
    <option value="idle">待机</option>
    <option value="walk">散步</option>
    <option value="flip">前翻</option>
    <option value="dance">跳舞</option>
  </select>
  <button onclick="toggleChat()" title="聊天">💬</button>
  <button onclick="capture('fullscreen')" title="全屏截图">📷</button>
  <button onclick="capture('free')" title="区域截图">✂️</button>
  <button onclick="switchMode()" title="切换Galgame">🎮</button>
  <button onclick="closeApp()" title="退出">×</button>
</div>
<script type="importmap">
{"imports":{"three":"../../node_modules/three/build/three.module.js","three/addons/":"../../node_modules/three/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three'
import { MMDLoader } from 'three/addons/loaders/MMDLoader.js'
import { MMDAnimationHelper } from 'three/addons/animation/MMDAnimationHelper.js'

const { ipc, readConfig, modelsDir, setIgnoreMouse } = window.electron
const cfg = readConfig()
const $ = id => document.getElementById(id)
const statusEl = $('status'), hitbox = $('hitbox'), bubble = $('bubble'), motionSel = $('motion')
const log = (...a) => { console.log('[DeepDeskPet]', ...a); statusEl.textContent = 'DeepDesk: ' + a.join(' ') }
const say = (text, ms=4500) => { bubble.textContent = text; bubble.style.display='block'; clearTimeout(bubble._t); bubble._t=setTimeout(()=>bubble.style.display='none',ms); positionBubble() }

let pointerUi = false, pointerPet = false
function syncMouse() { setIgnoreMouse(!(pointerUi || pointerPet)) }
;['hud','chat','bubble','hitbox'].forEach(id => {
  const el=$(id); el.addEventListener('mouseenter',()=>{ id==='hitbox'?pointerPet=true:pointerUi=true; syncMouse() })
  el.addEventListener('mouseleave',()=>{ id==='hitbox'?pointerPet=false:pointerUi=false; syncMouse() })
})
setIgnoreMouse(true)

const canvas = $('c')
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true, powerPreference:'low-power' })
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2))
renderer.setClearColor(0x000000, 0)
if ('outputColorSpace' in renderer) renderer.outputColorSpace = THREE.SRGBColorSpace
else renderer.outputEncoding = THREE.sRGBEncoding
renderer.toneMapping = THREE.NoToneMapping
const scene = new THREE.Scene()
scene.add(new THREE.AmbientLight(0xffffff, .42))
const key = new THREE.DirectionalLight(0xffffff, .72); key.position.set(3,8,7); scene.add(key)
const fill = new THREE.DirectionalLight(0xbfd0ff, .25); fill.position.set(-5,4,3); scene.add(fill)
let camera
function resize() {
  const w=innerWidth, h=innerHeight
  renderer.setSize(w,h,false)
  camera = new THREE.OrthographicCamera(-w/2,w/2,h,0,-1000,1000)
  camera.position.set(0,0,100); camera.lookAt(0,0,0); camera.updateProjectionMatrix()
  updateHitbox(); positionBubble()
}
window.addEventListener('resize', resize)

const loader = new MMDLoader()
let mesh=null, helper=null, clips={}, currentMotion='idle', clock=new THREE.Clock()
let pet = { x:Number(localStorage.petX || NaN), y:Number(localStorage.petY || NaN), height: innerHeight*(cfg.pet?.scale || .30), width: 180, facing:1, mode:'idle', walking:false }
if (!Number.isFinite(pet.x)) pet.x = innerWidth/2
if (!Number.isFinite(pet.y)) pet.y = innerHeight - 8
resize()
const modelUrl = new URL('../../models/' + cfg.activeModel, location.href).href
const VMD = {
  idle: new URL('./vmds/ぼんやり待ち合わせ_腕広いver(465f).vmd', import.meta.url).href,
  walk: new URL('./vmds/2.歩き10L_(40f_前移動20).vmd', import.meta.url).href,
  flip: new URL('./vmds/2.前宙L_(27f_前移動40).vmd', import.meta.url).href,
  dance: new URL('./vmds/GimmeGimme_with_emotion.vmd', import.meta.url).href
}

function updateHitbox() {
  hitbox.style.width = Math.max(90, pet.width*1.1) + 'px'
  hitbox.style.height = Math.max(150, pet.height*1.08) + 'px'
  hitbox.style.left = pet.x + 'px'
  hitbox.style.bottom = Math.max(0, innerHeight - pet.y - 4) + 'px'
}
function positionBubble() {
  bubble.style.left = Math.min(innerWidth-300, Math.max(8, pet.x - 55)) + 'px'
  bubble.style.bottom = Math.min(innerHeight-80, Math.max(20, innerHeight - pet.y + pet.height*.82)) + 'px'
}
function placeMesh() {
  if (!mesh) return
  const box = new THREE.Box3().setFromObject(mesh)
  mesh.position.x += (pet.x - innerWidth/2) - ((box.min.x + box.max.x)/2)
  mesh.position.y += (innerHeight - pet.y) - box.min.y
  mesh.rotation.y += (pet.facing * Math.PI/2 - mesh.rotation.y) * .18
}

function fixMaterials(m) {
  const csKey = 'colorSpace' in new THREE.Texture() ? 'colorSpace' : 'encoding'
  const csVal = csKey === 'colorSpace' ? THREE.SRGBColorSpace : THREE.sRGBEncoding
  const mats = Array.isArray(m.material) ? m.material : [m.material]
  let tex=0
  for (const mat of mats) {
    if (!mat) continue
    for (const k of ['map','emissiveMap','toonMap','matcap']) if (mat[k]) { mat[k][csKey]=csVal; tex++ }
    mat.needsUpdate = true
  }
  return { mats:mats.length, tex }
}
async function loadClip(name,url) {
  return new Promise(resolve => loader.loadAnimation(url, mesh, clip => { clip.name=name; log('motion',name,'ok',clip.duration.toFixed(2)+'s'); resolve(clip) }, undefined, e => { console.error(e); log('motion',name,'failed'); resolve(null) }))
}
function play(name) {
  currentMotion = name; motionSel.value = name
  const clip = clips[name] || clips.idle || clips.walk
  if (!mesh || !helper || !clip) return
  try { helper.remove(mesh) } catch {}
  helper.add(mesh, { animation:clip, physics:false, ik:true, grant:true })
  pet.walking = name === 'walk'
  say({idle:'我在这里。',walk:'出去走走。',flip:'看好了。',dance:'这支舞……只跳一小段。'}[name] || name, 1800)
}
async function boot() {
  log('loading model', cfg.activeModel)
  loader.load(modelUrl, async m => {
    mesh=m; scene.add(mesh); window.__mesh=mesh; window.__THREE=THREE
    const matInfo = fixMaterials(mesh)
    const box = new THREE.Box3().setFromObject(mesh)
    const rawH = Math.max(.001, box.max.y-box.min.y)
    const scale = pet.height / rawH
    mesh.scale.setScalar(scale)
    const box2 = new THREE.Box3().setFromObject(mesh)
    pet.height = box2.max.y-box2.min.y
    pet.width = Math.max(80, box2.max.x-box2.min.x)
    pet.x = Math.min(innerWidth-pet.width*.35, Math.max(pet.width*.35, pet.x))
    pet.y = Math.min(innerHeight-4, Math.max(pet.height*.4, pet.y))
    placeMesh(); updateHitbox(); positionBubble()
    log('model ok bones', mesh.skeleton?.bones?.length || 0, 'materials', matInfo.mats, 'textures', matInfo.tex)
    helper = new MMDAnimationHelper({ afterglow:0 })
    clips = {
      idle: await loadClip('idle', VMD.idle),
      walk: await loadClip('walk', VMD.walk),
      flip: await loadClip('flip', VMD.flip),
      dance: await loadClip('dance', VMD.dance)
    }
    window.__clips=clips; window.__mmdHelper=helper
    play(cfg.pet?.defaultMotion || 'idle')
  }, xhr => { if (xhr.total) log('model', Math.round(xhr.loaded/xhr.total*100)+'%') }, e => { console.error(e); log('model load failed'); say('模型加载失败：看控制台日志', 10000) })
}
boot()

let drag=null
hitbox.addEventListener('pointerdown', e => { drag={ dx:e.clientX-pet.x, dy:e.clientY-pet.y }; hitbox.setPointerCapture(e.pointerId); hitbox.classList.add('dragging') })
hitbox.addEventListener('pointermove', e => {
  if (!drag) return
  pet.x = Math.min(innerWidth-20, Math.max(20, e.clientX-drag.dx))
  pet.y = Math.min(innerHeight-4, Math.max(80, e.clientY-drag.dy))
  localStorage.petX=pet.x; localStorage.petY=pet.y
  updateHitbox(); positionBubble(); placeMesh()
})
hitbox.addEventListener('pointerup', e => { drag=null; hitbox.classList.remove('dragging'); try{hitbox.releasePointerCapture(e.pointerId)}catch{} })
hitbox.addEventListener('dblclick', () => switchMode())
motionSel.addEventListener('change', () => play(motionSel.value))

function autoWalk(dt) {
  if (!pet.walking || drag) return
  pet.x += pet.facing * dt * 70
  if (pet.x > innerWidth - pet.width*.45) { pet.x = innerWidth - pet.width*.45; pet.facing=-1 }
  if (pet.x < pet.width*.45) { pet.x = pet.width*.45; pet.facing=1 }
  updateHitbox(); positionBubble()
}
function animate() {
  requestAnimationFrame(animate)
  const dt = Math.min(.05, clock.getDelta())
  if (helper) helper.update(dt)
  autoWalk(dt); placeMesh()
  renderer.render(scene,camera)
}
animate()

let history=[]
window.sendMsg = async function() {
  const input=$('msg'), text=input.value.trim(); if(!text) return
  input.value=''; say('……', 60000); history.push({role:'user',content:text})
  try {
    const res = await fetch(`${cfg.agent.base_url}/chat/completions`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.agent.api_key}`}, body:JSON.stringify({model:cfg.agent.model,messages:history,stream:false}) })
    const data=await res.json(); const reply=data.choices?.[0]?.message?.content || '我听见了。'
    history.push({role:'assistant',content:reply}); say(reply,7000); ipc.send('plugin-msg',{type:'chat-reply',text:reply})
  } catch(e) { console.error(e); say('连接失败。',4000) }
}
window.toggleChat = () => { const el=$('chat'); el.style.display = el.style.display==='flex' ? 'none':'flex'; if(el.style.display==='flex') $('msg').focus() }
window.capture = async type => {
  const dataUrl = await ipc.invoke('capture', type, {})
  if (!dataUrl) return
  if (type === 'free') return showFreeCapture(dataUrl)
  const saved = await ipc.invoke('save-image', dataUrl); if(saved) say('截图已保存。')
}
function showFreeCapture(bgDataUrl) {
  const overlay=document.createElement('div'); overlay.style.cssText='position:fixed;inset:0;cursor:crosshair;z-index:9999;pointer-events:auto;'
  const bg=new Image(); bg.src=bgDataUrl
  const cvs=document.createElement('canvas'); cvs.style.cssText='position:absolute;inset:0;width:100%;height:100%;'; overlay.appendChild(cvs); document.body.appendChild(overlay)
  bg.onload=()=>{ cvs.width=bg.width; cvs.height=bg.height; cvs.getContext('2d').drawImage(bg,0,0); let start=null; overlay.onmousedown=e=>start={x:e.clientX,y:e.clientY}; overlay.onmouseup=async e=>{ if(!start)return; const x=Math.min(start.x,e.clientX),y=Math.min(start.y,e.clientY),w=Math.abs(e.clientX-start.x),h=Math.abs(e.clientY-start.y); const out=document.createElement('canvas'); out.width=w; out.height=h; out.getContext('2d').drawImage(cvs,x,y,w,h,0,0,w,h); overlay.remove(); const saved=await ipc.invoke('save-image',out.toDataURL()); if(saved) say('截图已保存。') } }
}
window.switchMode = () => ipc.send('switch-mode','galgame')
window.closeApp = () => ipc.send('switch-mode','close')
ipc.on('plugin-msg', (e,msg) => { if(msg.type==='chat-reply') say(msg.text) })
setTimeout(()=>say('DeepDesk 桌宠启动中。'), 500)
</script>
</body>
</html>
